# SmartWorkforce — nginx reverse proxy configuration
# Place this file at: /etc/nginx/sites-available/smartworkforce
# Then: sudo ln -s /etc/nginx/sites-available/smartworkforce /etc/nginx/sites-enabled/smartworkforce
# And:  sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Defined in the http{} block; put these in /etc/nginx/nginx.conf if not already there.
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=kiosk:10m rate=10r/s;

upstream smartworkforce_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name abg-hrd.dewebnetsolution.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name abg-hrd.dewebnetsolution.com;

    ssl_certificate     /etc/letsencrypt/live/abg-hrd.dewebnetsolution.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abg-hrd.dewebnetsolution.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=()" always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size    10m;
    client_body_timeout     30s;
    client_header_timeout   10s;
    send_timeout            30s;
    keepalive_timeout       65s;

    # ── Block common attack patterns ──────────────────────────────────────────
    if ($request_uri ~* "(union.*select|insert.*into|drop.*table|\.\./|<script)") {
        return 444;
    }

    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|exe|bat)$ {
        return 444;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Auth endpoint — strict rate limiting ──────────────────────────────────
    location /api/auth/login {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://smartworkforce_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Kiosk endpoint — moderate rate limiting ───────────────────────────────
    location /api/kiosk/ {
        limit_req zone=kiosk burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://smartworkforce_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://smartworkforce_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── General API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://smartworkforce_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Static web app ────────────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=100 nodelay;

        proxy_pass         http://smartworkforce_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        gzip             on;
        gzip_vary        on;
        gzip_min_length  1024;
        gzip_types       text/plain text/css application/json application/javascript text/xml application/xml;
    }

    # ── Deny server internals ─────────────────────────────────────────────────
    location ~* ^/(proc|sys|etc|root|boot)/ {
        return 444;
    }
}
