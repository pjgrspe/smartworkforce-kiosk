name: Deploy SmartWorkforce

on:
  push:
    branches: [main]
    paths:
      - 'web/src/**'
      - 'web/package.json'
      - 'web/vite.config.js'
      - 'kiosk-service/src/**'
      - 'kiosk-service/routes/**'
      - 'kiosk-service/package.json'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  # ── Job 1: Build web and deploy to VPS ──────────────────────────────────────
  deploy-web:
    name: Build & Deploy Web to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Apollo
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: npm install
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web

      - name: Deploy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: "web/dist"
          target: "/home/xdgamboa/apollo/web/"
          strip_components: 1

  # ── Job 2: Build kiosk and push to kiosk-service repo ───────────────────────
  deploy-kiosk:
    name: Build & Deploy Kiosk to Branch PCs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Apollo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: npm install
        working-directory: web

      - name: Fetch kiosk-service tags (for version indicator)
        run: git fetch --tags
        working-directory: kiosk-service

      - name: Build kiosk
        run: npm run build:kiosk
        working-directory: web

      - name: Push build to kiosk-service repo
        working-directory: kiosk-service
        env:
          KIOSK_DEPLOY_TOKEN: ${{ secrets.KIOSK_DEPLOY_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${KIOSK_DEPLOY_TOKEN}@github.com/pjgrspe/smartworkforce-kiosk.git
          git add public/
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "chore: kiosk build from Apollo@$(cd .. && git rev-parse --short HEAD)"
          git push origin main
